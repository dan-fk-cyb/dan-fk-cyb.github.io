name: "CI - Validação e Segurança (SAST)"

on:
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 12 * * 1' # Executa varredura semanal automática

jobs:
  link-checker:
    name: Validação de Hiperlinks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Validar Links Externos (HTTP 200)
        uses: lycheeverse/lychee-action@v1.8.0
        with:
          # Testa os links encontrados no seu index.html
          args: --verbose --no-progress index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-codeql:
    name: Varredura de Código (SAST)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript' # Compreende HTML/CSS/JS

      - name: Autofile-analysis
        uses: github/codeql-action/analyze@v2